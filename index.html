<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Leticia y Emilio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #F8F6F0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contenedor-invitacion {
            width: 100%;
            max-width: 500px; 
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.1); 
        }

        .contenedor-invitacion img {
            width: 100%;
            display: block;
            margin: 0;
            padding: 0;
            border: none;
        }

        .pagina-interactiva {
            position: relative;
            width: 100%;
        }

        /* ENLACES TRANSPARENTES (Para hacer clic) */
        .enlace-fantasma {
            position: absolute;
            background-color: transparent; 
            cursor: pointer;
            z-index: 10;
        }

        /* Coordenadas de los enlaces */
        .link-iglesia { top: 36%; left: 15%; width: 70%; height: 15%; }
        .link-hacienda { top: 78%; left: 15%; width: 70%; height: 15%; }
        .boton-confirmar { top: 32%; left: 12%; width: 76%; height: 9%; }

        /* EFECTO: ONDA EXPANSIVA (RIPPLE) */
        @keyframes latido {
            0% {
                transform: scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .efecto-onda {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: transparent;
            border: 2px solid #5A6B4E; /* Verde oliva oscuro */
            border-radius: 50%;
            pointer-events: none; /* Deja pasar el clic hacia el enlace */
            z-index: 5;
            animation: latido 1.5s infinite ease-out;
            margin-top: -15px; 
            margin-left: -15px;
        }

        /* Coordenadas de las manitas animadas */
        .onda-1 { top: 38%; left: 68%; } /* Mano Iglesia */
        .onda-2 { top: 81%; left: 73%; } /* Mano Hacienda */
        .onda-3 { top: 39%; left: 69%; } /* Mano Botón Confirmar */

    </style>
</head>
<body>

    <div class="contenedor-invitacion">
        
        <img src="pagina1.jpg" alt="Inicio Invitación">
        
        <div class="pagina-interactiva">
            <img src="pagina2.jpg" alt="Ceremonia y Celebración">
            
            <div class="efecto-onda onda-1"></div>
            <div class="efecto-onda onda-2"></div>

            <a href="https://www.google.com/maps/place//data=!4m2!3m1!1s0xd126c03b1cb5ddd:0xb8d58dd7afe78e54?sa=X&ved=1t:8290&ictx=111&cshid=1780855535366299" class="enlace-fantasma link-iglesia" target="_blank"></a>
            <a href="https://www.google.com/maps/place/Hacienda+Atalaya+Alta/@37.4420626,-5.7877186,17z/data=!3m1!4b1!4m6!3m5!1s0xd12611ac7d1f079:0x29802d30011c4166!8m2!3d37.4420626!4d-5.7877186!16s%2Fg%2F1tcyypgz?entry=ttu&g_ep=EgoyMDI2MDYwMS4wIKXMDSoASAFQAw%3D%3D" class="enlace-fantasma link-hacienda" target="_blank"></a>
        </div>
        
        <img src="pagina3.jpg" alt="Itinerario">
        
        <div class="pagina-interactiva">
            <img src="pagina4.jpg" alt="Confirmación">
            
            <div class="efecto-onda onda-3"></div>

            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfPe3-0KDtn3x_H_QqM3ofouFeU6GqWemODvY71lp6cgZxNDQ/viewform" class="enlace-fantasma boton-confirmar" target="_blank"></a>
        </div>
        
        <img src="pagina5.jpg" alt="Despedida">
    </div>

</body>
</html>
